<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog – LexiNova | Tipy na učenie slovíčok</title>
    <meta name="description" content="Praktické tipy, ako sa efektívne učiť cudzie slovíčka: overené techniky, rozložené opakovanie a učenie s pomocou AI.">
    <link rel="canonical" href="{{ site_url }}/blog">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Blog – LexiNova">
    <meta property="og:description" content="Praktické tipy, ako sa efektívne učiť cudzie slovíčka.">
    <meta property="og:url" content="{{ site_url }}/blog">
    <meta property="og:image" content="{{ site_url }}/static/img/og-image.jpg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4079ff">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/static/css/fonts.css">
    <script>
        if (localStorage.getItem('darkMode') === 'true')
            document.documentElement.setAttribute('data-theme', 'dark');
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #4079ff;
            --accent:  #40ffaa;
            --grad:    linear-gradient(135deg, #4079ff, #40ffaa);
            --bg:      #f4f7fe;
            --surface: #ffffff;
            --text:    #1a202c;
            --muted:   #718096;
            --border:  #e2e8f0;
            --shadow:  0 8px 32px rgba(64,121,255,.09);
        }
        [data-theme="dark"] {
            --bg:      #0f172a;
            --surface: #1e293b;
            --text:    #f1f5f9;
            --muted:   #94a3b8;
            --border:  #334155;
            --shadow:  0 8px 32px rgba(0,0,0,.35);
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background .3s, color .3s;
        }
        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(244,247,254,.92);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
        }
        [data-theme="dark"] .header { background: rgba(15,23,42,.92); }
        .header-inner {
            max-width: 860px; margin: 0 auto;
            padding: 0 1.5rem; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo {
            font-size: 1.25rem; font-weight: 800; text-decoration: none;
            background: var(--grad); -webkit-background-clip: text;
            background-clip: text; -webkit-text-fill-color: transparent;
        }
        .back-link { color: var(--muted); text-decoration: none; font-size: .9rem; }
        .back-link:hover { color: var(--primary); }

        .content { max-width: 860px; margin: 0 auto; padding: 2.5rem 1.5rem 3rem; width: 100%; }
        .page-header { text-align: center; margin-bottom: 2.5rem; }
        .page-header h1 { font-size: 2rem; font-weight: 800; margin-bottom: .6rem; }
        .page-header .sub { color: var(--muted); font-size: 1.05rem; }

        .article-card {
            display: block; background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 1.5rem 1.75rem; margin-bottom: 1.25rem;
            text-decoration: none; color: inherit; box-shadow: var(--shadow);
            transition: transform .15s, border-color .15s;
        }
        .article-card:hover { transform: translateY(-2px); border-color: var(--primary); }
        .article-card h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: .5rem; }
        .article-card p { color: var(--muted); font-size: .95rem; line-height: 1.55; }
        .article-card .date { display: block; margin-top: .75rem; font-size: .8rem; color: var(--muted); }
    </style>
</head>
<body>
<header class="header">
    <div class="header-inner">
        <a href="/" class="logo">⚡ LexiNova</a>
        <a href="/" class="back-link">← Domov</a>
    </div>
</header>

<div class="content">
    <div class="page-header">
        <h1>Blog</h1>
        <p class="sub">Praktické tipy, ako sa učiť slovíčka efektívnejšie.</p>
    </div>

    {% for a in articles %}
    <a class="article-card" href="/blog/{{ a.slug }}">
        <h2>{{ a.title }}</h2>
        <p>{{ a.description }}</p>
        <span class="date">{{ a.date }}</span>
    </a>
    {% endfor %}
</div>

<script src="/static/js/cookie-notice.js" defer></script>
<script src="/static/js/site-footer.js" defer></script>
</body>
</html>
