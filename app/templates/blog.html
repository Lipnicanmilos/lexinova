<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog – LexiNova | Tipy na učenie slovíčok</title>
    <meta name="description" content="Praktické tipy, ako sa efektívne učiť cudzie slovíčka: overené techniky, rozložené opakovanie a učenie s pomocou AI.">
    <link rel="canonical" href="{{ site_url }}/blog">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Blog – LexiNova">
    <meta property="og:description" content="Praktické tipy, ako sa efektívne učiť cudzie slovíčka.">
    <meta property="og:url" content="{{ site_url }}/blog">
    <meta property="og:image" content="{{ site_url }}/static/img/og-image.jpg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4079ff">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <script>(function(){try{if(localStorage.getItem('darkMode')==='true')document.documentElement.setAttribute('data-theme','dark');}catch(e){}document.documentElement.classList.add('js');})()</script>
    <link rel="stylesheet" href="/static/css/fonts.css">
    <link rel="stylesheet" href="/static/css/design-system.css">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; }
        .header-inner { height: 66px; display: flex; align-items: center; justify-content: space-between; }
        .header-right { display: flex; align-items: center; gap: .6rem; }
        .back-link { color: var(--muted); font-size: .9rem; }
        .back-link:hover { color: var(--text); }

        .content { max-width: 820px; margin: 0 auto; padding: clamp(2.5rem,6vw,4.5rem) clamp(1.25rem,4vw,2rem) 4rem; width: 100%; }
        .page-head { text-align: center; margin-bottom: 2.75rem; }
        .page-head h1 { font-size: clamp(2rem,5vw,3rem); margin-bottom: .6rem; }
        .page-head .sub { color: var(--muted); font-size: 1.05rem; }

        .article-card { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1.15rem; text-decoration: none; color: inherit; }
        .article-card .body { flex: 1; }
        .article-card h2 { font-size: 1.2rem; margin-bottom: .45rem; transition: color .2s; }
        .article-card:hover h2 { color: var(--primary-ink); }
        .article-card p { color: var(--muted); font-size: .95rem; line-height: 1.6; }
        .article-card .date { display: block; margin-top: .7rem; font-size: .8rem; color: var(--muted); }
        .article-card .arrow { flex: none; color: var(--muted); transition: transform .2s, color .2s; margin-top: .2rem; }
        .article-card:hover .arrow { color: var(--primary-ink); transform: translateX(3px); }
        .article-card .arrow svg { width: 22px; height: 22px; }
    </style>
</head>
<body>
<header class="ds-nav" id="header">
    <div class="ds-container header-inner">
        <a href="/" class="ds-logo"><img src="/static/logo.png" alt=""><b>Lexi<span>Nova</span></b></a>
        <div class="header-right">
            <button class="theme-toggle" id="themeToggle" aria-label="Prepnúť tému" title="Prepnúť tému">
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M6.3 17.7l-1.4 1.4M19.1 4.9l-1.4 1.4"/></svg>
            </button>
            <a href="/" class="back-link">← Domov</a>
        </div>
    </div>
</header>

<div class="content">
    <div class="page-head">
        <h1><span class="grad-text">Blog</span></h1>
        <p class="sub">Praktické tipy, ako sa učiť slovíčka efektívnejšie.</p>
    </div>

    {% for a in articles %}
    <a class="card card-hover article-card" href="/blog/{{ a.slug }}">
        <div class="body">
            <h2>{{ a.title }}</h2>
            <p>{{ a.description }}</p>
            <span class="date">{{ a.date }}</span>
        </div>
        <span class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
    </a>
    {% endfor %}
</div>

<script>
    document.getElementById('themeToggle').addEventListener('click', () => {
        const dark = document.documentElement.getAttribute('data-theme') === 'dark';
        if (dark) { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('darkMode','false'); }
        else { document.documentElement.setAttribute('data-theme','dark'); localStorage.setItem('darkMode','true'); }
    });
</script>
<script src="/static/js/cookie-notice.js" defer></script>
<script src="/static/js/site-footer.js" defer></script>
</body>
</html>
