<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-en="Welcome" data-sk="Vitajte">Welcome</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(45deg, #40ffaa, #4079ff, #40ffaa, #4079ff);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5; /* Trochu tmavšia pre kontrast */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
            perspective: 1000px; /* Dôležité pre 3D efekt */
        }

        /* Pozadie s plávajúcimi prvkami */
        .background-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            color: rgba(64, 121, 255, 0.1); /* Jemná modrá */
            font-weight: bold;
            user-select: none;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        .container {
            background: rgba(255, 255, 255, 0.95); /* Mierna priehľadnosť */
            backdrop-filter: blur(10px);
            padding: 3rem 2rem;
            border-radius: 20px; /* Väčšie zaoblenie */
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 90%;
            position: relative;
            box-sizing: border-box;
            transform-style: preserve-3d; /* Pre 3D efekt */
            transition: transform 0.1s ease-out;
            
            /* Pre vstupnú animáciu */
            opacity: 0;
            transform: translateY(30px);
            animation: containerPop 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes containerPop {
            to { opacity: 1; transform: translateY(0) rotateX(0) rotateY(0); }
        }

        /* Animácia pre elementy vnútri */
        .animate-item {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
        }

        .animate-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .animated-gradient-text {
            position: relative;
            margin-bottom: 2rem;
            word-wrap: break-word;
        }

        .text-content {
            position: relative;
            z-index: 2;
            background: var(--primary-gradient);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease infinite;
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -1px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        p {
            color: #555;
            line-height: 1.6;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .auth-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
        }

        .auth-link {
            padding: 1rem 2rem;
            background: #4079ff;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Bouncy efekt */
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .auth-link:nth-child(2) {
            background: white;
            color: #4079ff;
            border: 2px solid #4079ff;
        }

        /* Cool hover efekt pre tlačidlá */
        .auth-link::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 0%; height: 100%;
            background: rgba(255,255,255,0.2);
            z-index: -1;
            transition: width 0.3s;
        }

        .auth-link:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 20px rgba(64, 121, 255, 0.3);
        }

        .auth-link:nth-child(2):hover {
            background: #4079ff;
            color: white;
        }

        .language-switcher {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 10;
        }

        .lang-btn {
            padding: 0.4rem 0.8rem;
            background-color: transparent;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
            font-weight: bold;
            color: #888;
        }

        .lang-btn.active {
            background-color: #4079ff;
            color: white;
            border-color: #4079ff;
            box-shadow: 0 4px 10px rgba(64, 121, 255, 0.3);
        }

        /* Mobilné zobrazenie */
        @media (max-width: 480px) {
            .container {
                padding: 2rem 1rem;
                width: 95%;
                transform: none !important; /* Vypneme 3D tilt na mobile */
            }
            h1.text-content { font-size: 1.8rem; }
            .auth-links { flex-direction: column; }
            .auth-link { width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
<body>

    <div class="background-shapes" id="bgShapes"></div>

    <div class="container" id="card">
        <div class="language-switcher animate-item">
            <button class="lang-btn active" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="sk">SK</button>
        </div>
        
        <div class="animated-gradient-text animate-item">
            <h1 class="text-content" data-en="Welcome to WordKeeper" data-sk="Vitajte v WordKeeper">Welcome to WordKeeper</h1>
        </div>
        
        <p class="animate-item" data-en="WordKeeper is a simple tool for learning foreign vocabulary with translations. Create categories, add words, track your knowledge levels, and test yourself to improve your skills." data-sk="WordKeeper je jednoduchý nástroj na učenie cudzích slovíčok s prekladmi. Vytvárajte kategórie, pridávajte slová, sledujte úrovne znalostí a testujte sa na zlepšenie vašich zručností.">
            WordKeeper is a simple tool for learning foreign vocabulary with translations. Create categories, add words, track your knowledge levels, and test yourself to improve your skills.
        </p>
        
        <div class="auth-links animate-item">
            <a href="/login" class="auth-link" data-en="Login" data-sk="Prihlásiť sa">Login</a>
            <a href="/register" class="auth-link" data-en="Register" data-sk="Registrovať sa">Register</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- 1. Jazykový prepínač (Tvoj pôvodný kód) ---
            const langButtons = document.querySelectorAll('.lang-btn');
            const currentLang = localStorage.getItem('preferredLang') || 'en';
            setActiveLanguage(currentLang);
            
            langButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const lang = this.getAttribute('data-lang');
                    setActiveLanguage(lang);
                    localStorage.setItem('preferredLang', lang);
                });
            });
            
            function setActiveLanguage(lang) {
                langButtons.forEach(btn => {
                    btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
                });
                document.querySelectorAll('[data-sk], [data-en]').forEach(element => {
                    if (element.hasAttribute(`data-${lang}`)) {
                        const text = element.getAttribute(`data-${lang}`);
                        if (element.tagName === 'TITLE') document.title = text;
                        else element.textContent = text;
                    }
                });
            }

            // --- 2. ENERGETICKÉ VYLEPŠENIA ---

            // A) Staggered Entrance (Kaskádový efekt)
            // Pridá triedu .visible s malým oneskorením pre každý element
            const animatedItems = document.querySelectorAll('.animate-item');
            animatedItems.forEach((item, index) => {
                setTimeout(() => {
                    item.classList.add('visible');
                }, 300 + (index * 150)); // Začne po 300ms, každý ďalší o 150ms neskôr
            });

            // B) 3D Tilt Efekt na Container (iba pre desktop)
            const card = document.getElementById('card');
            const container = document.body;

            // Ak nie sme na dotykovom zariadení
            if (window.matchMedia("(hover: hover)").matches) {
                container.addEventListener('mousemove', (e) => {
                    const xAxis = (window.innerWidth / 2 - e.pageX) / 25; // Delenie určuje citlivosť
                    const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
                    
                    // Aplikovanie rotácie
                    card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
                });

                // Reset pri odchode myši
                container.addEventListener('mouseleave', () => {
                    card.style.transform = `rotateY(0deg) rotateX(0deg)`;
                    card.style.transition = "transform 0.5s ease";
                });
                
                // Odstránenie trhania pri vstupe myši
                container.addEventListener('mouseenter', () => {
                    card.style.transition = "none";
                });
            }

            // C) Generovanie plávajúcich písmeniek na pozadí
            const bgContainer = document.getElementById('bgShapes');
            const characters = ['A', 'B', 'C', '?', '!', 'あ', 'Ω', '文', 'W', 'K']; // Znaky pre atmosféru učenia
            
            function createShape() {
                const shape = document.createElement('div');
                shape.classList.add('shape');
                shape.innerText = characters[Math.floor(Math.random() * characters.length)];
                
                // Náhodná pozícia a veľkosť
                const size = Math.random() * 40 + 10; // 10px až 50px
                shape.style.fontSize = `${size}px`;
                shape.style.left = `${Math.random() * 100}vw`;
                
                // Náhodná rýchlosť animácie
                const duration = Math.random() * 10 + 10; // 10s až 20s
                shape.style.animationDuration = `${duration}s`;
                
                bgContainer.appendChild(shape);

                // Odstránenie po skončení animácie aby sa nepreplnila pamäť
                setTimeout(() => {
                    shape.remove();
                }, duration * 1000);
            }

            // Vytvoríme počiatočné množstvo
            for(let i=0; i<15; i++) {
                setTimeout(createShape, i * 500); // Spúšťať postupne
            }
            
            // Pridávať nové priebežne
            setInterval(createShape, 1000);
        });
    </script>
</body>
</html>
