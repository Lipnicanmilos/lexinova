<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-en="Welcome" data-sk="Vitajte">Welcome</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            background: white;
            padding: 3rem 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 90%;
            position: relative;
            box-sizing: border-box;
            overflow: hidden;
        }
        h1 {
            color: #2E7D32;
            margin-bottom: 2rem;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            hyphens: auto;
            max-width: 100%;
            line-height: 1.4;
        }
        .auth-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            box-sizing: border-box;
            width: 100%;
        }
        .auth-link {
            padding: 0.75rem 1.5rem;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
            display: inline-block;
        }
        .auth-link:hover {
            background-color: #3e8e41;
            transform: translateY(-2px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .language-switcher {
            position: absolute;
            top: 1rem;
            right: 1rem;
        }
        .lang-btn {
            padding: 0.4rem 0.8rem;
            background-color: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        .lang-btn:hover {
            background-color: #e0e0e0;
        }
        .lang-btn.active {
            background-color: #4CAF50;
            color: white;
        }
        .logo {
            max-width: 150px;
            margin-bottom: 1.5rem;
        }
        @media (max-width: 480px) {
            body {
                padding: 0;
            }
            .container {
                padding: 0.5rem;
                width: 100%;
                max-width: none;
                border-radius: 0;
                margin: 0;
                box-shadow: none;
                overflow: hidden;
            }
            h1 {
                font-size: 1.1rem;
                margin-bottom: 0.75rem;
                line-height: 1.3;
                padding: 0;
            }
            .auth-links {
                flex-direction: column;
                gap: 0.5rem;
                margin-top: 0;
                padding: 0;
            }
            .auth-link {
                width: 100%;
                padding: 0.6rem 0.5rem;
                font-size: 0.9rem;
                box-sizing: border-box;
                margin: 0;
            }
            .language-switcher {
                position: static;
                margin: 0 0 0.5rem 0;
                display: flex;
                justify-content: center;
                gap: 0.15rem;
                padding: 0;
            }
            .lang-btn {
                padding: 0.2rem 0.4rem;
                font-size: 0.65rem;
                min-width: 28px;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Prepínač jazykov -->
        <div class="language-switcher">
            <button class="lang-btn active" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="sk">SK</button>
        </div>
        
        <!-- Add your logo here if you have one -->
        <!-- <img src="/static/logo.png" alt="Logo" class="logo"> -->
        
        <h1 data-en="Welcome to WordKeeper" data-sk="Vitajte v WordKeeper">Welcome to WordKeeper</h1>
        
        <p data-en="WordKeeper is a simple tool for learning foreign vocabulary with translations. Create categories, add words, track your knowledge levels, and test yourself to improve your skills." data-sk="WordKeeper je jednoduchý nástroj na učenie cudzích slovíčok s prekladmi. Vytvárajte kategórie, pridávajte slová, sledujte úrovne znalostí a testujte sa na zlepšenie vašich zručností.">WordKeeper is a simple tool for learning foreign vocabulary with translations. Create categories, add words, track your knowledge levels, and test yourself to improve your skills.</p>
        
        <div class="auth-links">
            <a href="/login" class="auth-link" data-en="Login" data-sk="Prihlásiť sa">Login</a>
            <a href="/register" class="auth-link" data-en="Register" data-sk="Registrovať sa">Register</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const langButtons = document.querySelectorAll('.lang-btn');
            const currentLang = localStorage.getItem('preferredLang') || 'en';
            
            // Nastavíme aktívny jazyk
            setActiveLanguage(currentLang);
            
            // Prepínač jazykov
            langButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const lang = this.getAttribute('data-lang');
                    setActiveLanguage(lang);
                    localStorage.setItem('preferredLang', lang);
                });
            });
            
            function setActiveLanguage(lang) {
                // Aktualizácia prepínača
                langButtons.forEach(btn => {
                    btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
                });
                
                // Aktualizácia textov
                document.querySelectorAll('[data-sk], [data-en]').forEach(element => {
                    if (element.hasAttribute(`data-${lang}`)) {
                        const text = element.getAttribute(`data-${lang}`);
                        if (element.tagName === 'TITLE') {
                            document.title = text;
                        } else {
                            element.textContent = text;
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
